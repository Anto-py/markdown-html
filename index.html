<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Générateur de fichier .md</title>
  <style>
    :root { --bg:#0f1220; --card:#171a2b; --accent:#6ae3ff; --text:#e7e9ee; --muted:#8b90a3; }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      background: radial-gradient(1200px 600px at 10% -10%, #1b2040 0, transparent 60%),
                  radial-gradient(800px 600px at 110% 10%, #122438 0, transparent 60%),
                  var(--bg);
      color:var(--text); min-height:100svh; display:grid; place-items:center; padding:24px;
    }
    .app{ width:min(900px, 100%); background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border:1px solid rgba(255,255,255,.08); border-radius:20px; backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0,0,0,.25); overflow:hidden;
    }
    header{ padding:20px 22px; background:var(--card); border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; align-items:center; gap:12px;
    }
    header .dot{ width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 16px var(--accent);}
    header h1{ font-size:18px; margin:0; letter-spacing:.2px; }
    main{ display:grid; gap:16px; padding:18px; }
    .row{ display:grid; gap:10px; }
    label{ font-size:14px; color:var(--muted); }
    input[type="text"]{
      width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,.1);
      background:#0f1325; color:var(--text); outline: none;
    }
    textarea{
      width:100%; min-height:280px; resize:vertical; padding:14px; line-height:1.5;
      border-radius:12px; border:1px solid rgba(255,255,255,.1); background:#0f1325; color:var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }
    .actions{ display:flex; gap:12px; align-items:center; justify-content:flex-end; margin-top:6px; }
    button{
      appearance:none; border:0; cursor:pointer; border-radius:12px; padding:12px 16px;
      color:#0c1020; background:linear-gradient(90deg, #6ae3ff, #a7f3d0); font-weight:700;
      box-shadow:0 8px 20px rgba(106,227,255,.25); transition:transform .05s ease;
    }
    button:active{ transform: translateY(1px); }
    .ghost{ background:transparent; color:var(--muted); border:1px dashed rgba(255,255,255,.15); box-shadow:none; }
    .hint{ font-size:12px; color:var(--muted); }
    footer{ padding:12px 18px 18px; color:var(--muted); font-size:12px; text-align:center; }
    .badge{ display:inline-block; padding:2px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.12); margin-left:6px;}
  </style>
</head>
<body>
  <div class="app" role="application" aria-label="Générateur de fichier Markdown">
    <header>
      <span class="dot" aria-hidden="true"></span>
      <h1>Générateur <code>.md</code><span class="badge">GitHub Pages Ready</span></h1>
    </header>

    <main>
      <div class="row">
        <label for="filename">Nom du fichier (sans extension)</label>
        <input id="filename" type="text" placeholder="README" autocomplete="off" />
        <p class="hint">L’extension <code>.md</code> sera ajoutée automatiquement.</p>
      </div>

      <div class="row">
        <label for="content">Votre texte Markdown</label>
        <textarea id="content" placeholder="# Mon titre

Du texte **Markdown** ici.
- Puces
- Liens
- Code
"></textarea>
      </div>

      <div class="actions">
        <button class="ghost" id="clearBtn" type="button" title="Vider le contenu">Vider</button>
        <button id="downloadBtn" type="button" title="Télécharger le .md">Télécharger le .md</button>
      </div>
      <p class="hint">Aucune donnée n’est envoyée : tout se passe dans votre navigateur.</p>
    </main>

    <footer>
      Fichier statique unique • Compatible Chrome, Firefox, Safari, Edge (desktop & mobile)
    </footer>
  </div>

  <script>
    // ~20 lignes de JS minimalistes pour créer et télécharger le .md
    const $ = (sel) => document.querySelector(sel);
    const filenameInput = $('#filename');
    const contentInput  = $('#content');
    const downloadBtn   = $('#downloadBtn');
    const clearBtn      = $('#clearBtn');

    function sanitizeName(name){
      // retire les caractères peu sûrs pour un nom de fichier
      return (name || 'README').trim().replace(/[/\\?%*:|"<>]/g, '_') || 'README';
    }

    downloadBtn.addEventListener('click', () => {
      const base = sanitizeName(filenameInput.value);
      const file = base.toLowerCase().endsWith('.md') ? base : base + '.md';
      const text = contentInput.value ?? '';
      const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = file;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    clearBtn.addEventListener('click', () => {
      contentInput.value = '';
      contentInput.focus();
    });

    // Accessibilité: Ctrl/Cmd+S pour télécharger
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
        e.preventDefault();
        downloadBtn.click();
      }
    });
  </script>
</body>
</html>
